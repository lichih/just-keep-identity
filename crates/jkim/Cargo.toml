[package]
name = "jkim"
version.workspace = true
edition.workspace = true

[dependencies]
jki-core = { path = "../jki-core" }
clap = { version = "4.4", features = ["derive"] }
ratatui = "0.26"
crossterm = "0.27"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
url = "2"
uuid = { version = "1.0", features = ["v4"] }
base64 = "0.22.1"

[dev-dependencies]
tempfile = "3"
serial_test = "3"
